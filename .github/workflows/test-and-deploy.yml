name: Test & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  GITHUB_PAGES_URL: >-
    https://olegvoronchenko.github.io/${{ github.event.repository.name }}/

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Node dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run tests
        run: pytest tests/ -v

      - name: Generate report
        run: python scripts/generate_report.py

      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Wait for GitHub Pages deployment
        run: |
          echo "Waiting for GitHub Pages deployment to complete..."

          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          MAX_ATTEMPTS=20
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            # Check GitHub Deployments API for pages deployment
            DEPLOYMENT_STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/deployments?sha=$SHA&environment=github-pages" \
              | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if not data:
              print('pending')
          else:
              dep_id = data[0]['id']
              print(dep_id)
          ")

            echo "Attempt $((ATTEMPT+1)): deployment_id=$DEPLOYMENT_STATUS"

            if [ "$DEPLOYMENT_STATUS" != "pending" ] && \
               [ "$DEPLOYMENT_STATUS" != "" ]; then
              # Check deployment status
              STATUS=$(curl -s \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/deployments/$DEPLOYMENT_STATUS/statuses" \
                | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if data:
              print(data[0]['state'])
          else:
              print('pending')
          ")

              echo "Deployment state: $STATUS"

              if [ "$STATUS" = "success" ]; then
                echo "GitHub Pages deployed successfully!"
                sleep 5
                break
              fi
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 15
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "GitHub Pages deployment did not complete after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Run deployment verification tests
        run: pytest tests/test_deployment.py -v --tb=short
