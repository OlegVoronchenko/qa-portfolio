name: Test & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  GITHUB_PAGES_URL: >-
    https://olegvoronchenko.github.io/${{ github.event.repository.name }}/

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Node dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Inject deployment fingerprint
        run: |
          echo "${{ github.sha }}" > dist/version.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run tests
        run: pytest tests/ -v

      - name: Generate report
        run: python scripts/generate_report.py

      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Wait for correct deployment version
        run: |
          EXPECTED_SHA="${{ github.sha }}"
          URL="https://olegvoronchenko.github.io/${{ github.event.repository.name }}/version.txt"
          MAX_ATTEMPTS=20
          ATTEMPT=0

          echo "Waiting for SHA: $EXPECTED_SHA"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            DEPLOYED_SHA=$(curl -s "$URL" | tr -d '[:space:]')
            echo "Attempt $((ATTEMPT+1)): deployed=$DEPLOYED_SHA"

            if [ "$DEPLOYED_SHA" = "$EXPECTED_SHA" ]; then
              echo "Correct version deployed!"
              break
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 15
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "Correct version never deployed"
            exit 1
          fi

      - name: Run deployment verification tests
        run: pytest tests/test_deployment.py -v --tb=short
        env:
          GITHUB_SHA: ${{ github.sha }}
