name: Test & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  GITHUB_PAGES_URL: >-
    https://olegvoronchenko.github.io/${{ github.event.repository.name }}/
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Parse CV or use default profile
        run: |
          CV_FILE=$(find cv/ -name "*.pdf" -o -name "*.docx" 2>/dev/null | head -1)

          if [ -n "$CV_FILE" ]; then
            echo "Found CV: $CV_FILE"
            python scripts/parse_cv.py "$CV_FILE"
            echo "CV parsed successfully"
          else
            echo "No CV found in cv/ — using default profile"
            cp src/data/profile.default.json src/data/profile.json
          fi

      - name: Install Node dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run tests
        working-directory: qa
        run: pytest tests/ -v

      - name: Generate report
        run: python scripts/generate_report.py

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ github.run_number }}
          path: qa/screenshots/
          retention-days: 30

      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Wait for GitHub Pages deployment
        run: |
          URL="https://olegvoronchenko.github.io/${{ github.event.repository.name }}/"
          MAX_ATTEMPTS=20
          ATTEMPT=0

          echo "Polling: $URL"
          sleep 20

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "$URL")

            echo "Attempt $((ATTEMPT+1)): HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "GitHub Pages is responding with 200. Waiting 15s for CDN..."
              sleep 15
              break
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 15
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "GitHub Pages did not respond after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Run deployment verification tests
        working-directory: qa
        run: pytest tests/test_deployment.py -v --tb=short
