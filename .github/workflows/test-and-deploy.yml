name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

env:
  GITHUB_PAGES_URL: >-
    https://olegvoronchenko.github.io/${{ github.event.repository.name }}/
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CV parser dependencies
        run: pip install -r requirements.txt

      - name: Parse CV or use default profile
        run: |
          CV_FILE=$(find cv/ -name "*.pdf" -o -name "*.docx" 2>/dev/null | head -1)

          if [ -n "$CV_FILE" ]; then
            echo "Found CV: $CV_FILE"
            python scripts/parse_cv.py "$CV_FILE"
            echo "CV parsed successfully"
          else
            echo "No CV found in cv/ — using default profile"
            cp src/data/profile.default.json src/data/profile.json
          fi

      - name: Install Node dependencies
        run: npm ci

      # ── Code Quality Gates ────────────────────────────

      - name: Check for hardcoded strings in React components
        run: |
          echo "Running hardcoded string detector..."
          python scripts/check_hardcoded.py

      - name: Lint React components
        run: |
          echo "Running ESLint..."
          npx eslint src/ --ext .jsx,.tsx,.js,.ts \
            --max-warnings 0 || true

      - name: Check test standards
        run: |
          echo "Running test standards checker..."
          python scripts/check_test_standards.py

      - name: Verify profile.json schema
        run: |
          python3 -c "
          import json, sys
          from pathlib import Path

          required_keys = [
              'personal', 'summary', 'stats',
              'experience', 'skills', 'tools',
              'projects', 'education', 'certifications',
              'contact'
          ]

          profile_path = Path('src/data/profile.json')
          if not profile_path.exists():
              print('ERROR: profile.json not found')
              sys.exit(1)

          profile = json.loads(profile_path.read_text())
          missing = [k for k in required_keys if k not in profile]

          if missing:
              print(f'ERROR: Missing keys in profile.json: {missing}')
              sys.exit(1)

          print('✓ profile.json schema is valid')
          print(f'  Keys present: {list(profile.keys())}')
          "

      - name: Generate requirements JSON from markdown
        run: python scripts/build_requirements_json.py

      - name: Build Vite app
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Install test dependencies
        working-directory: qa
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: qa
        run: python -m playwright install --with-deps

      - name: Run Playwright tests
        working-directory: qa
        run: |
          mkdir -p reports screenshots
          python -m pytest tests/ -v -s --tb=short \
            --json-report \
            --json-report-file=reports/raw.json \
            || true

      - name: Generate enriched test report
        if: always()
        run: python scripts/generate_report.py
        env:
          RUNNER_OS: ${{ runner.os }}
          RUNNER_NAME: ${{ runner.name }}
          RUNNER_ARCH: ${{ runner.arch }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Fail if any tests failed
        if: always()
        run: |
          python3 -c "
          import json, sys
          with open('dist/test_report.json') as f:
              data = json.load(f)
          failed = data['summary'].get('failed', 0)
          if failed > 0:
              print(f'  {failed} test(s) failed')
              sys.exit(1)
          print('All tests passed')
          "

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ github.run_number }}
          path: qa/screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Wait for GitHub Pages deployment
        run: |
          URL="https://olegvoronchenko.github.io/${{ github.event.repository.name }}/"
          MAX_ATTEMPTS=20
          ATTEMPT=0

          echo "Polling: $URL"
          sleep 20

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "$URL")

            echo "Attempt $((ATTEMPT+1)): HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "GitHub Pages is responding with 200. Waiting 15s for CDN..."
              sleep 15
              break
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 15
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "GitHub Pages did not respond after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Run deployment verification tests
        working-directory: qa
        run: pytest tests/test_deployment.py -v --tb=short
