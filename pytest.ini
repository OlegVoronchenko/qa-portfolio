[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    smoke: Critical path tests that must always pass
    navigation: Navbar and link tests
    content: Section content verification tests
    responsive: Mobile and viewport tests
    performance: Page load timing tests
    accessibility: Accessibility and semantic HTML tests
